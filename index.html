<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Random Quote Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background-color: #ffffff;
      border-radius: 16px;
      padding: 40px 36px;
      max-width: 580px;
      width: 90%;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      font-size: 26px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 30px;
      letter-spacing: 0.5px;
    }

    .quote-box {
      background-color: #f8f9ff;
      border-left: 4px solid #5c6bc0;
      border-radius: 8px;
      padding: 30px 24px;
      margin-bottom: 24px;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .quote-icon {
      font-size: 48px;
      color: #5c6bc0;
      line-height: 1;
      text-align: left;
    }

    #quote-text {
      font-size: 18px;
      color: #333333;
      line-height: 1.8;
      font-style: italic;
      text-align: left;
    }

    #author-name {
      font-size: 15px;
      font-weight: 600;
      color: #5c6bc0;
      text-align: right;
    }

    .btn-new {
      display: inline-block;
      padding: 14px 40px;
      background-color: #5c6bc0;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
      letter-spacing: 0.3px;
    }

    .btn-new:hover {
      background-color: #3f51b5;
    }

    .btn-new:active {
      transform: scale(0.97);
    }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #aaaaaa;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Random Quote Generator</h1>

    <div class="quote-box" id="quote-box">
      <div class="quote-icon">"</div>
      <p id="quote-text"></p>
      <p id="author-name"></p>
    </div>

    <button class="btn-new" onclick="newQuote()">New Quote</button>

    <p class="footer">Click the button to get a new quote</p>
  </div>

  <script>
    const quotes = [
      { text: "The only way to do great work is to love what you do.", author: "— Steve Jobs" },
      { text: "In the middle of every difficulty lies opportunity.", author: "— Albert Einstein" },
      { text: "It does not matter how slowly you go as long as you do not stop.", author: "— Confucius" },
      { text: "Life is what happens when you are busy making other plans.", author: "— John Lennon" },
      { text: "The future belongs to those who believe in the beauty of their dreams.", author: "— Eleanor Roosevelt" },
      { text: "Strive not to be a success, but rather to be of value.", author: "— Albert Einstein" },
      { text: "You miss 100% of the shots you don't take.", author: "— Wayne Gretzky" },
      { text: "Whether you think you can or you think you can't, you're right.", author: "— Henry Ford" },
      { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "— Chinese Proverb" },
      { text: "Spread love everywhere you go. Let no one ever come to you without leaving happier.", author: "— Mother Teresa" },
      { text: "Do not go where the path may lead; go where there is no path and leave a trail.", author: "— Ralph Waldo Emerson" },
      { text: "The greatest glory in living lies not in never falling, but in rising every time we fall.", author: "— Nelson Mandela" },
      { text: "Life is either a daring adventure or nothing at all.", author: "— Helen Keller" },
      { text: "Many of life's failures are people who did not realize how close they were to success when they gave up.", author: "— Thomas Edison" },
      { text: "You will face many defeats in life, but never let yourself be defeated.", author: "— Maya Angelou" }
    ];

    let lastIndex = -1;

    function newQuote() {
      let index;
      do {
        index = Math.floor(Math.random() * quotes.length);
      } while (index === lastIndex);
      lastIndex = index;

      const box = document.getElementById('quote-box');
      box.style.animation = 'none';
      void box.offsetWidth;
      box.style.animation = 'fadeIn 0.5s ease';

      document.getElementById('quote-text').textContent = quotes[index].text;
      document.getElementById('author-name').textContent = quotes[index].author;
    }

    newQuote();
  </script>

</body>
</html>
